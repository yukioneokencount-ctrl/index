<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate B</title>

<style>
body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  text-align:center;
  font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  background:linear-gradient(#79cdfa 0%, #dff6ff 55%, #fff1a8 100%);
  color:#155f93;
}

.cloud{
  position:absolute;
  font-size:58px;
  opacity:0.75;
  animation:cloudMove 18s linear infinite;
}

.cloud.one{ top:70px; left:-120px; }
.cloud.two{ top:150px; left:-220px; animation-delay:6s; font-size:42px; }

@keyframes cloudMove{
  from{ transform:translateX(0); }
  to{ transform:translateX(120vw); }
}

.card{
  position:relative;
  z-index:2;
  margin:55px auto;
  padding:30px 22px 36px;
  max-width:380px;
  background:rgba(255,255,255,0.83);
  border-radius:34px;
  box-shadow:0 14px 36px rgba(0,0,0,0.13);
}

.label{
  font-size:12px;
  letter-spacing:4px;
  color:#f4a900;
  font-weight:bold;
}

h1{
  font-size:42px;
  margin:12px 0 22px;
  letter-spacing:5px;
}

img{
  width:285px;
  max-width:88%;
  border-radius:28px;
  box-shadow:0 10px 25px rgba(0,0,0,0.14);
}

button{
  margin-top:28px;
  font-size:20px;
  letter-spacing:3px;
  padding:17px 48px;
  border-radius:999px;
  border:none;
  background:#ffd43b;
  color:#155f93;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 7px 0 #efa900;
}

button:active{
  transform:translateY(5px);
  box-shadow:0 2px 0 #efa900;
}

.nowplaying{
  margin-top:20px;
  font-size:13px;
  letter-spacing:3px;
  opacity:0;
}

.nowplaying.show{
  opacity:1;
}

.flower{
  position:absolute;
  font-size:28px;
  animation:flowerUp 1.7s ease-out forwards;
  pointer-events:none;
  z-index:5;
}

@keyframes flowerUp{
  0%{ transform:translateY(0) rotate(0deg) scale(0.6); opacity:0; }
  20%{ opacity:1; }
  100%{ transform:translateY(-130px) rotate(220deg) scale(1.4); opacity:0; }
}
</style>
</head>

<body>

<div class="cloud one">☁️</div>
<div class="cloud two">☁️</div>

<div class="card">
  <div class="label">RE-ENTRY SONG QUIZ</div>
  <h1>Candidate B</h1>

  <img src="青と夏.jpg">

  <br>

  <button id="playButton" onclick="playSong()">LISTEN</button>

  <div id="text" class="nowplaying">♪ SUMMER IS PLAYING...</div>

  <audio id="song">
    <source src="青と夏.m4a" type="audio/mp4">
  </audio>
</div>

<script>
function playSong(){
  const song = document.getElementById("song");
  const button = document.getElementById("playButton");

  song.currentTime = 0;
  song.play();

  button.innerHTML = "NOW PLAYING";
  document.getElementById("text").classList.add("show");

  for(let i = 0; i < 22; i++){
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = ["🌻","✨","☀️","💙"][Math.floor(Math.random()*4)];
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.top = (65 + Math.random() * 25) + "vh";
    document.body.appendChild(flower);

    setTimeout(() => {
      flower.remove();
    }, 1800);
  }

  setTimeout(() => {
    song.pause();
    song.currentTime = 0;
    button.innerHTML = "LISTEN";
  }, 15000);
}
</script>

</body>
</html>
